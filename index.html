<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>听澜 · 角色工坊</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f0f2f5;
            --sidebar-bg: #fff;
            --main-bg: #fff;
            --border: #e0e0e0;
            --text: #333;
            --text-secondary: #555;
            --user-bg: #e3f2fd;
            --user-color: #0d47a1;
            --ai-bg: #f1f1f1;
            --ai-color: #1b1b1b;
            --input-border: #ddd;
            --btn-bg: #f5f5f5;
            --btn-hover: #e8e8e8;
            --bar-bg: #fffbe6;
            --bar-border: #f0e68c;
            --bar-color: #8a6d3b;
            --overlay-bg: rgba(0,0,0,0.5);
        }
        .dark-mode {
            --bg: #1a1a2e;
            --sidebar-bg: #16213e;
            --main-bg: #1a1a2e;
            --border: #0f3460;
            --text: #e0e0e0;
            --text-secondary: #aaa;
            --user-bg: #1a3a5c;
            --user-color: #90caf9;
            --ai-bg: #2a2a4a;
            --ai-color: #d0d0d0;
            --input-border: #0f3460;
            --btn-bg: #2a2a4a;
            --btn-hover: #3a3a5a;
            --bar-bg: #2a2a1e;
            --bar-border: #5a5a3e;
            --bar-color: #c0c0a0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }
        /* ===== 侧边栏 ===== */
        .sidebar {
            width: 260px;
            min-width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
            transition: transform 0.3s, background 0.3s;
            z-index: 20;
        }
        .sidebar-header {
            padding: 12px 14px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: var(--sidebar-bg);
            z-index: 1;
        }
        .sidebar-header h3 { font-size: 16px; font-weight: 600; }
        .new-chat-btn {
            background: #1a73e8;
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .chat-list { flex: 1; overflow-y: auto; padding: 6px; }
        .chat-item {
            padding: 10px 12px;
            margin: 3px 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            word-break: break-word;
        }
        .chat-item:hover { background: var(--btn-hover); }
        .chat-item.active { background: #e3f2fd; font-weight: 500; }
        .dark-mode .chat-item.active { background: #1a3a5c; }
        .chat-item .delete-chat {
            visibility: hidden;
            background: none; border: none; color: #999;
            font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1;
        }
        .chat-item:hover .delete-chat { visibility: visible; }
        .chat-item .delete-chat:hover { color: #e53935; }
        .sidebar-footer {
            border-top: 1px solid var(--border);
            padding: 6px;
            position: sticky;
            bottom: 0;
            background: var(--sidebar-bg);
        }
        .sidebar-footer button {
            display: block; width: 100%; padding: 9px 10px; margin: 3px 0;
            border: none; background: var(--btn-bg); color: var(--text);
            border-radius: 8px; cursor: pointer; font-size: 13px; text-align: left;
        }
        .sidebar-footer button:hover { background: var(--btn-hover); }

        /* ===== 主区域 ===== */
        .main {
            flex: 1; display: flex; flex-direction: column; background: var(--main-bg);
            min-width: 0; position: relative; transition: background 0.3s;
        }
        .chat-bg-layer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            opacity: 0.15; filter: blur(2px); z-index: 0; pointer-events: none;
        }
        .chat-header {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border);
            font-size: 14px; font-weight: 500; color: var(--text-secondary);
            display: flex; justify-content: space-between; align-items: center;
            position: relative; z-index: 1; background: var(--main-bg);
        }
        .menu-toggle {
            display: none;
            background: none; border: none; font-size: 22px; cursor: pointer;
            color: var(--text); padding: 0 6px;
        }
        .export-btn {
            background: transparent; border: 1px solid var(--input-border);
            color: var(--text-secondary); padding: 4px 10px;
            border-radius: 14px; cursor: pointer; font-size: 12px;
        }
        .writing-requirement-bar {
            padding: 6px 14px; background: var(--bar-bg);
            border-bottom: 1px solid var(--bar-border); font-size: 12px;
            color: var(--bar-color); display: flex; align-items: center; gap: 6px;
            position: relative; z-index: 1; flex-shrink: 0;
        }
        .writing-requirement-bar span { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        #chat-box {
            flex: 1; overflow-y: auto; padding: 12px 10px;
            display: flex; flex-direction: column; gap: 12px;
            position: relative; z-index: 1;
        }
        .msg {
            max-width: 85%; padding: 10px 14px; border-radius: 16px;
            line-height: 1.5; font-size: 14px; word-break: break-word; white-space: pre-wrap;
        }
        .user { align-self: flex-end; background: var(--user-bg); color: var(--user-color); border-bottom-right-radius: 4px; }
        .assistant { align-self: flex-start; background: var(--ai-bg); color: var(--ai-color); border-bottom-left-radius: 4px; }
        .role-bubble { border-left: 3px solid; }
        .input-area {
            display: flex; align-items: flex-end; gap: 6px;
            padding: 10px 14px; border-top: 1px solid var(--border);
            position: relative; z-index: 1; background: var(--main-bg);
        }
        #user-input {
            flex: 1; padding: 10px 14px; border: 1px solid var(--input-border);
            border-radius: 20px; font-size: 14px; font-family: inherit;
            resize: none; max-height: 100px; overflow-y: auto; line-height: 1.4;
            background: var(--main-bg); color: var(--text);
        }
        #user-input:focus { outline: none; border-color: #1a73e8; }
        .send-btn {
            background: #1a73e8; border: none; color: white;
            width: 42px; height: 42px; border-radius: 50%;
            font-size: 18px; cursor: pointer; flex-shrink: 0;
        }
        .sidebar-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 15;
        }

        /* ===== 手机适配 ===== */
        @media (max-width: 768px) {
            .sidebar {
                position: fixed; top: 0; left: 0; height: 100%;
                transform: translateX(-100%);
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.show { display: block; }
            .menu-toggle { display: inline-block; }
            .chat-header { padding: 8px 10px; font-size: 13px; }
            #chat-box { padding: 10px 8px; gap: 10px; }
            .msg { max-width: 90%; font-size: 13px; padding: 8px 12px; }
            .input-area { padding: 8px 10px; }
            #user-input { font-size: 13px; padding: 8px 12px; }
            .send-btn { width: 38px; height: 38px; font-size: 16px; }
        }

        /* ===== 弹窗（手机弹窗全屏） ===== */
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay-bg); justify-content: center; align-items: center; z-index: 100;
        }
        .dialog-box {
            background: var(--sidebar-bg); color: var(--text);
            padding: 20px; border-radius: 16px;
            width: 92%; max-width: 500px; max-height: 85vh; overflow-y: auto;
        }
        .dialog-box h3 { margin-bottom: 14px; font-size: 16px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 3px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 8px 10px; border: 1px solid var(--input-border);
            border-radius: 8px; font-size: 14px; font-family: inherit;
            background: var(--main-bg); color: var(--text);
        }
        .form-group textarea { resize: vertical; min-height: 50px; }
        .dialog-box button {
            padding: 7px 16px; margin-right: 8px; margin-top: 6px;
            border-radius: 8px; border: none; cursor: pointer; font-size: 13px;
        }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-secondary { background: var(--btn-bg); color: var(--text); }
        .btn-danger { background: #e53935; color: white; }
        .btn-outline { background: transparent; color: #1a73e8; border: 1px solid #1a73e8; }
        .range-group { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
        .range-group label { min-width: 60px; font-size: 12px; color: var(--text-secondary); }
        .range-group input[type="range"] { flex: 1; }
        .bg-preview {
            width: 100%; height: 80px; background-size: cover; background-position: center;
            border-radius: 8px; margin: 8px 0; border: 1px solid var(--input-border);
        }
        .role-checkbox-item {
            display: flex; align-items: center; gap: 6px; padding: 5px 0; font-size: 14px;
        }
        .role-checkbox-item input[type="checkbox"] { transform: scale(1.2); }
    </style>
</head>
<body>
    <!-- 侧边栏遮罩（手机用） -->
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <!-- 左侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>🎭 听澜</h3>
            <button class="new-chat-btn" onclick="createNewChat()" title="新建对话">+</button>
        </div>
        <div class="chat-list" id="chat-list"></div>
        <div class="sidebar-footer">
            <button onclick="editCurrentUserCard()">👤 我的角色设定</button>
            <button onclick="editCurrentCharacterCard()">🪪 AI 角色卡</button>
            <button onclick="editCurrentWritingReq()">📝 写作要求</button>
            <button onclick="manageGroupChat()">👥 群聊模式</button>
            <button onclick="openTemplateLibrary()">📚 角色模板库</button>
            <button onclick="openBackgroundSettings()">🖼️ 更换背景</button>
            <button onclick="editGlobalDefaults()">🌐 全局默认值</button>
            <button onclick="toggleDarkMode()">🌓 暗黑模式</button>
            <button onclick="showApiKeySetup()">🔑 API Key</button>
            <button onclick="closeSidebar()" style="color:#e53935;">✕ 关闭菜单</button>
        </div>
    </div>

    <!-- 右侧主区域 -->
    <div class="main">
        <div class="chat-bg-layer" id="chat-bg-layer"></div>
        <div class="chat-header">
            <button class="menu-toggle" onclick="openSidebar()">☰</button>
            <span id="chat-title">DeepSeek</span>
            <button class="export-btn" onclick="showExportDialog()">📥</button>
        </div>
        <div class="writing-requirement-bar" id="writing-req-bar" style="display:none;">
            📝 <span id="writing-req-text"></span>
            <button onclick="editCurrentWritingReq()" style="background:none;border:none;cursor:pointer;color:#1a73e8;font-size:12px;">编辑</button>
        </div>
        <div id="chat-box"></div>
        <div class="input-area">
            <textarea id="user-input" rows="1" placeholder="输入消息..."></textarea>
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <!-- 弹窗：用户角色卡 -->
    <div class="overlay" id="user-card-overlay">
        <div class="dialog-box">
            <h3>👤 我的角色设定</h3>
            <div class="form-group"><label>姓名</label><input id="user-name"></div>
            <div class="form-group"><label>性别</label><input id="user-gender"></div>
            <div class="form-group"><label>年龄</label><input id="user-age"></div>
            <div class="form-group"><label>性格</label><textarea id="user-personality"></textarea></div>
            <div class="form-group"><label>外貌描述</label><textarea id="user-appearance"></textarea></div>
            <div class="form-group"><label>与 AI 角色的关系</label><textarea id="user-relation"></textarea></div>
            <div class="form-group"><label>其他补充设定</label><textarea id="user-extra"></textarea></div>
            <div>
                <button class="btn-primary" onclick="saveUserCard()">保存</button>
                <button class="btn-secondary" onclick="closeOverlay('user-card-overlay')">取消</button>
                <button class="btn-danger" onclick="clearUserCard()">清除</button>
            </div>
        </div>
    </div>
    <!-- 弹窗：AI角色卡 -->
    <div class="overlay" id="character-card-overlay">
        <div class="dialog-box">
            <h3>🪪 AI 角色卡设定</h3>
            <div class="form-group"><label>姓名</label><input id="char-name"></div>
            <div class="form-group"><label>性别</label><input id="char-gender"></div>
            <div class="form-group"><label>年龄</label><input id="char-age"></div>
            <div class="form-group"><label>性格</label><textarea id="char-personality"></textarea></div>
            <div class="form-group"><label>外貌</label><textarea id="char-appearance"></textarea></div>
            <div class="form-group"><label>对用户的感情态度</label><textarea id="char-attitude"></textarea></div>
            <div class="form-group"><label>人格底线</label><textarea id="char-bottom-line"></textarea></div>
            <div class="form-group"><label>其他补充设定</label><textarea id="char-extra"></textarea></div>
            <div>
                <button class="btn-primary" onclick="saveCharacterCard()">保存</button>
                <button class="btn-secondary" onclick="closeOverlay('character-card-overlay')">取消</button>
                <button class="btn-danger" onclick="clearCharacterCard()">清除</button>
                <button class="btn-outline" onclick="saveCardAsTemplate()">💾 保存为模板</button>
            </div>
        </div>
    </div>
    <!-- 弹窗：写作要求 -->
    <div class="overlay" id="writing-req-overlay">
        <div class="dialog-box">
            <h3>📝 写作要求</h3>
            <textarea id="writing-req-input" style="width:100%;height:100px;"></textarea>
            <div>
                <button class="btn-primary" onclick="saveWritingReq()">保存</button>
                <button class="btn-secondary" onclick="closeOverlay('writing-req-overlay')">取消</button>
                <button class="btn-danger" onclick="clearWritingReq()">清除</button>
            </div>
        </div>
    </div>
    <!-- 弹窗：背景设置 -->
    <div class="overlay" id="bg-settings-overlay">
        <div class="dialog-box">
            <h3>🖼️ 聊天背景设置</h3>
            <input type="file" id="bg-file-input" accept="image/*" style="display:none;" onchange="handleBgFileSelect(event)">
            <div class="bg-preview" id="bg-preview">暂无背景</div>
            <button class="btn-outline" onclick="document.getElementById('bg-file-input').click()">📁 选择图片</button>
            <button class="btn-danger" onclick="removeBackground()" style="margin-left:6px;">移除背景</button>
            <div class="range-group"><label>透明度</label><input type="range" id="bg-opacity" min="5" max="50" value="15" oninput="updateBgPreview()"><span id="bg-opacity-val">15%</span></div>
            <div class="range-group"><label>模糊度</label><input type="range" id="bg-blur" min="0" max="10" value="2" oninput="updateBgPreview()"><span id="bg-blur-val">2px</span></div>
            <div><button class="btn-primary" onclick="saveBackground()">保存</button><button class="btn-secondary" onclick="closeOverlay('bg-settings-overlay')">取消</button></div>
        </div>
    </div>
    <!-- 弹窗：全局默认值 -->
    <div class="overlay" id="global-defaults-overlay">
        <div class="dialog-box">
            <h3>🌐 全局默认值</h3>
            <h4>默认用户角色卡</h4>
            <div class="form-group"><label>姓名</label><input id="g-user-name"></div>
            <div class="form-group"><label>性别</label><input id="g-user-gender"></div>
            <div class="form-group"><label>年龄</label><input id="g-user-age"></div>
            <div class="form-group"><label>性格</label><textarea id="g-user-personality"></textarea></div>
            <div class="form-group"><label>外貌</label><textarea id="g-user-appearance"></textarea></div>
            <div class="form-group"><label>与AI关系</label><textarea id="g-user-relation"></textarea></div>
            <div class="form-group"><label>其他</label><textarea id="g-user-extra"></textarea></div>
            <h4>默认 AI 角色卡</h4>
            <div class="form-group"><label>姓名</label><input id="g-char-name"></div>
            <div class="form-group"><label>性别</label><input id="g-char-gender"></div>
            <div class="form-group"><label>年龄</label><input id="g-char-age"></div>
            <div class="form-group"><label>性格</label><textarea id="g-char-personality"></textarea></div>
            <div class="form-group"><label>外貌</label><textarea id="g-char-appearance"></textarea></div>
            <div class="form-group"><label>感情态度</label><textarea id="g-char-attitude"></textarea></div>
            <div class="form-group"><label>底线</label><textarea id="g-char-bottom-line"></textarea></div>
            <div class="form-group"><label>其他</label><textarea id="g-char-extra"></textarea></div>
            <h4>默认写作要求</h4>
            <textarea id="g-writing-req" style="width:100%;height:60px;"></textarea>
            <div><button class="btn-primary" onclick="saveGlobalDefaults()">保存</button><button class="btn-secondary" onclick="closeOverlay('global-defaults-overlay')">取消</button></div>
        </div>
    </div>
    <!-- 弹窗：API Key -->
    <div class="overlay" id="api-key-overlay">
        <div class="dialog-box">
            <h3>🔑 设置 API Key</h3>
            <input type="password" id="api-key-input" placeholder="sk-..." style="width:100%;padding:10px;margin:10px 0;border:1px solid var(--input-border);border-radius:8px;font-size:14px;background:var(--main-bg);color:var(--text);">
            <button class="btn-primary" onclick="saveApiKey()">保存</button>
            <button class="btn-secondary" onclick="closeOverlay('api-key-overlay')">取消</button>
        </div>
    </div>
    <!-- 弹窗：导出 -->
    <div class="overlay" id="export-overlay">
        <div class="dialog-box">
            <h3>📥 导出对话</h3>
            <button class="btn-outline" onclick="exportChat('txt')" style="display:block;width:100%;margin:6px 0;padding:10px;">📄 纯文本</button>
            <button class="btn-outline" onclick="exportChat('md')" style="display:block;width:100%;margin:6px 0;padding:10px;">📝 Markdown</button>
            <button class="btn-outline" onclick="exportChat('json')" style="display:block;width:100%;margin:6px 0;padding:10px;">💾 JSON</button>
            <button class="btn-outline" onclick="exportChat('html')" style="display:block;width:100%;margin:6px 0;padding:10px;">🌐 HTML</button>
            <button class="btn-secondary" onclick="closeOverlay('export-overlay')" style="margin-top:8px;">取消</button>
        </div>
    </div>
    <!-- 弹窗：模板库 -->
    <div class="overlay" id="template-library-overlay">
        <div class="dialog-box">
            <h3>📚 角色模板库</h3>
            <div id="template-list"></div>
            <button class="btn-secondary" onclick="closeOverlay('template-library-overlay')" style="margin-top:10px;">关闭</button>
        </div>
    </div>
    <!-- 弹窗：群聊管理 -->
    <div class="overlay" id="group-chat-overlay">
        <div class="dialog-box">
            <h3>👥 群聊模式设置</h3>
            <div id="group-role-selection"></div>
            <div style="margin-top:10px;">
                <button class="btn-primary" onclick="saveGroupChatSettings()">保存</button>
                <button class="btn-danger" onclick="disableGroupChat()">切回单角色</button>
                <button class="btn-secondary" onclick="closeOverlay('group-chat-overlay')">取消</button>
            </div>
        </div>
    </div>

    <script>
        // ===== 数据管理 =====
        const STORAGE_KEY = 'deepseek_chats_v7';
        const API_KEY_STORAGE = 'deepseek_api_key';
        const GLOBAL_DEFAULTS_KEY = 'deepseek_global_defaults_v3';
        const TEMPLATES_KEY = 'deepseek_char_templates';
        const BG_SETTINGS_KEY = 'deepseek_bg_settings';
        const DARK_MODE_KEY = 'deepseek_dark_mode';

        let chats = [];
        let currentChatId = null;
        let globalDefaults = { userCard: {}, characterCard: {}, writingRequirement: '' };
        let templates = [];
        let bgSettings = { imageDataUrl: '', opacity: 15, blur: 2 };
        let isDarkMode = false;

        function loadData() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                chats = JSON.parse(saved);
                chats.forEach(c => { if (!c.userCard) c.userCard = {}; if (!c.mode) c.mode = 'single'; if (!c.groupCards) c.groupCards = []; });
            } else {
                const gd = getGlobalDefaults();
                chats = [{
                    id: generateId(), title: '新对话', messages: [],
                    userCard: gd.userCard || {}, characterCard: gd.characterCard || {},
                    writingRequirement: gd.writingRequirement || '', mode: 'single', groupCards: []
                }];
            }
            const savedId = localStorage.getItem('current_chat_id');
            if (savedId && chats.find(c => c.id === savedId)) { currentChatId = savedId; }
            else { currentChatId = chats[0].id; }
            const gdSaved = localStorage.getItem(GLOBAL_DEFAULTS_KEY);
            if (gdSaved) globalDefaults = JSON.parse(gdSaved);
            const tSaved = localStorage.getItem(TEMPLATES_KEY);
            if (tSaved) templates = JSON.parse(tSaved);
            const bgSaved = localStorage.getItem(BG_SETTINGS_KEY);
            if (bgSaved) bgSettings = JSON.parse(bgSaved);
            isDarkMode = localStorage.getItem(DARK_MODE_KEY) === 'true';
        }

        function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(chats)); localStorage.setItem('current_chat_id', currentChatId); }
        function saveTemplates() { localStorage.setItem(TEMPLATES_KEY, JSON.stringify(templates)); }
        function getGlobalDefaults() { const gd = localStorage.getItem(GLOBAL_DEFAULTS_KEY); return gd ? JSON.parse(gd) : { userCard: {}, characterCard: {}, writingRequirement: '' }; }
        function generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 4); }
        function getCurrentChat() { return chats.find(c => c.id === currentChatId) || chats[0]; }

        let apiKey = localStorage.getItem(API_KEY_STORAGE);
        function showApiKeySetup() { document.getElementById('api-key-overlay').style.display = 'flex'; document.getElementById('api-key-input').value = apiKey || ''; }
        function saveApiKey() { const key = document.getElementById('api-key-input').value.trim(); if (!key.startsWith('sk-')) { alert('Key 格式错误'); return; } localStorage.setItem(API_KEY_STORAGE, key); apiKey = key; closeOverlay('api-key-overlay'); }
        if (!apiKey) { setTimeout(() => { showApiKeySetup(); }, 500); }

        function toggleDarkMode() { isDarkMode = !isDarkMode; localStorage.setItem(DARK_MODE_KEY, isDarkMode); applyTheme(); }
        function applyTheme() { if (isDarkMode) { document.body.classList.add('dark-mode'); } else { document.body.classList.remove('dark-mode'); } }

        let tempBgImage = null;
        function openBackgroundSettings() {
            tempBgImage = bgSettings.imageDataUrl;
            document.getElementById('bg-opacity').value = bgSettings.opacity;
            document.getElementById('bg-blur').value = bgSettings.blur;
            updateBgPreview();
            document.getElementById('bg-settings-overlay').style.display = 'flex';
            closeSidebar();
        }
        function handleBgFileSelect(event) {
            const file = event.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) { tempBgImage = e.target.result; updateBgPreview(); };
            reader.readAsDataURL(file);
        }
        function updateBgPreview() {
            const preview = document.getElementById('bg-preview');
            const opacity = document.getElementById('bg-opacity').value;
            const blur = document.getElementById('bg-blur').value;
            document.getElementById('bg-opacity-val').textContent = opacity + '%';
            document.getElementById('bg-blur-val').textContent = blur + 'px';
            if (tempBgImage) { preview.style.backgroundImage = `url(${tempBgImage})`; preview.style.opacity = opacity/100; preview.style.filter = `blur(${blur}px)`; preview.textContent = ''; }
            else { preview.style.backgroundImage = 'none'; preview.textContent = '暂无背景'; }
        }
        function saveBackground() {
            bgSettings.imageDataUrl = tempBgImage || '';
            bgSettings.opacity = parseInt(document.getElementById('bg-opacity').value);
            bgSettings.blur = parseInt(document.getElementById('bg-blur').value);
            localStorage.setItem(BG_SETTINGS_KEY, JSON.stringify(bgSettings));
            applyBackground(); closeOverlay('bg-settings-overlay');
        }
        function removeBackground() { tempBgImage = ''; saveBackground(); }
        function applyBackground() {
            const layer = document.getElementById('chat-bg-layer');
            if (bgSettings.imageDataUrl) { layer.style.backgroundImage = `url(${bgSettings.imageDataUrl})`; layer.style.opacity = bgSettings.opacity/100; layer.style.filter = `blur(${bgSettings.blur}px)`; }
            else { layer.style.backgroundImage = 'none'; layer.style.opacity = 0; layer.style.filter = 'none'; }
        }

        const chatListEl = document.getElementById('chat-list');
        const chatBoxEl = document.getElementById('chat-box');
        const chatTitleEl = document.getElementById('chat-title');
        const userInputEl = document.getElementById('user-input');
        const writingReqBar = document.getElementById('writing-req-bar');
        const writingReqText = document.getElementById('writing-req-text');

        function renderChatList() {
            chatListEl.innerHTML = '';
            chats.forEach(chat => {
                const div = document.createElement('div');
                div.className = 'chat-item' + (chat.id === currentChatId ? ' active' : '');
                let indicator = '';
                if (chat.mode === 'group' && chat.groupCards && chat.groupCards.length > 0) indicator = ` 👥${chat.groupCards.map(c=>c.name||'?').join(',')}`;
                else if (chat.characterCard && chat.characterCard.name) indicator = ' 🎭';
                if (chat.userCard && chat.userCard.name) indicator += ' 👤';
                div.innerHTML = `<span style="flex:1;" onclick="switchChat('${chat.id}')">${escapeHtml(chat.title)}${indicator}</span>
                    <button class="delete-chat" onclick="event.stopPropagation();deleteChat('${chat.id}')">✕</button>`;
                chatListEl.appendChild(div);
            });
        }
        function renderMessages() {
            const chat = getCurrentChat(); chatBoxEl.innerHTML = '';
            if (chat.mode === 'group' && chat.groupCards && chat.groupCards.length > 0) chatTitleEl.textContent = '👥 ' + chat.groupCards.map(c=>c.name||'?').join('、');
            else {
                const card = chat.characterCard || {}, userCard = chat.userCard || {};
                let title = ''; if (userCard.name) title += '👤'+userCard.name+' ↔ '; if (card.name) title += '🎭'+card.name;
                if (!title) title = chat.title || '听澜'; chatTitleEl.textContent = title;
            }
            if (chat.writingRequirement) { writingReqBar.style.display = 'flex'; writingReqText.textContent = chat.writingRequirement; }
            else { writingReqBar.style.display = 'none'; }
            if (chat.messages.length === 0) { chatBoxEl.innerHTML = '<div style="color:var(--text-secondary);text-align:center;margin-top:30px;">开始对话吧</div>'; return; }
            chat.messages.forEach(msg => {
                if (msg.role === 'user') addMessageBubble('user', chat.userCard?.name || '我', msg.content, null);
                else addMessageBubble('assistant', msg.roleName || 'AI', msg.content, msg.color || null);
            });
            scrollToBottom();
        }
        function addMessageBubble(role, displayName, text, color) {
            const div = document.createElement('div');
            div.className = 'msg ' + role; if (color) { div.classList.add('role-bubble'); div.style.borderColor = color; }
            let html = escapeHtml(text).replace(/\n/g, '<br>');
            if (role === 'user') div.innerHTML = html;
            else div.innerHTML = `<strong style="color:${color||'inherit'};">${escapeHtml(displayName)}：</strong>${html}`;
            chatBoxEl.appendChild(div);
        }
        function scrollToBottom() { chatBoxEl.scrollTop = chatBoxEl.scrollHeight; }
        function refreshUI() { renderChatList(); renderMessages(); }
        function closeOverlay(id) { document.getElementById(id).style.display = 'none'; }

        function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebar-overlay').classList.add('show'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebar-overlay').classList.remove('show'); }

        function editCurrentUserCard() {
            const chat = getCurrentChat(); const card = chat.userCard || {};
            document.getElementById('user-name').value = card.name || ''; document.getElementById('user-gender').value = card.gender || '';
            document.getElementById('user-age').value = card.age || ''; document.getElementById('user-personality').value = card.personality || '';
            document.getElementById('user-appearance').value = card.appearance || ''; document.getElementById('user-relation').value = card.relation || '';
            document.getElementById('user-extra').value = card.extra || '';
            document.getElementById('user-card-overlay').style.display = 'flex'; closeSidebar();
        }
        function saveUserCard() {
            const chat = getCurrentChat();
            chat.userCard = { name: document.getElementById('user-name').value.trim(), gender: document.getElementById('user-gender').value.trim(), age: document.getElementById('user-age').value.trim(), personality: document.getElementById('user-personality').value.trim(), appearance: document.getElementById('user-appearance').value.trim(), relation: document.getElementById('user-relation').value.trim(), extra: document.getElementById('user-extra').value.trim() };
            saveData(); closeOverlay('user-card-overlay'); refreshUI();
        }
        function clearUserCard() { if (!confirm('清除你的角色设定？')) return; getCurrentChat().userCard = {}; saveData(); closeOverlay('user-card-overlay'); refreshUI(); }

        function openTemplateLibrary() {
            const listEl = document.getElementById('template-list'); listEl.innerHTML = '';
            if (templates.length === 0) { listEl.innerHTML = '<p style="color:var(--text-secondary);">暂无模板</p>'; }
            templates.forEach((t, i) => {
                const div = document.createElement('div'); div.style = 'display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;';
                div.innerHTML = `<span>${escapeHtml(t.name||'未命名')}</span><div>
                    <button class="btn-outline" onclick="loadTemplateToCurrent(${i})">加载</button>
                    <button class="btn-secondary" onclick="editTemplate(${i})">编辑</button>
                    <button class="btn-danger" onclick="deleteTemplate(${i})">删除</button></div>`;
                listEl.appendChild(div);
            });
            document.getElementById('template-library-overlay').style.display = 'flex'; closeSidebar();
        }
        function loadTemplateToCurrent(i) { if (!confirm('加载角色"'+(templates[i].name||'未命名')+'"？')) return; const chat = getCurrentChat(); chat.mode = 'single'; chat.characterCard = JSON.parse(JSON.stringify(templates[i].card)); chat.groupCards = []; saveData(); closeOverlay('template-library-overlay'); refreshUI(); }
        function editTemplate(i) { fillCharacterForm(templates[i].card); document.getElementById('character-card-overlay').dataset.editTemplateIndex = i; document.getElementById('character-card-overlay').style.display = 'flex'; }
        function deleteTemplate(i) { if (!confirm('删除模板"'+(templates[i].name||'未命名')+'"？')) return; templates.splice(i,1); saveTemplates(); openTemplateLibrary(); }
        function saveCardAsTemplate() { const card = collectCharacterForm(); if (!card.name) { alert('请填写姓名'); return; } templates.push({ id: generateId(), name: card.name, card: card }); saveTemplates(); alert('已保存到模板库'); }
        function collectCharacterForm() { return { name: document.getElementById('char-name').value.trim(), gender: document.getElementById('char-gender').value.trim(), age: document.getElementById('char-age').value.trim(), personality: document.getElementById('char-personality').value.trim(), appearance: document.getElementById('char-appearance').value.trim(), attitude: document.getElementById('char-attitude').value.trim(), bottomLine: document.getElementById('char-bottom-line').value.trim(), extra: document.getElementById('char-extra').value.trim() }; }
        function fillCharacterForm(card) { document.getElementById('char-name').value = card.name || ''; document.getElementById('char-gender').value = card.gender || ''; document.getElementById('char-age').value = card.age || ''; document.getElementById('char-personality').value = card.personality || ''; document.getElementById('char-appearance').value = card.appearance || ''; document.getElementById('char-attitude').value = card.attitude || ''; document.getElementById('char-bottom-line').value = card.bottomLine || ''; document.getElementById('char-extra').value = card.extra || ''; }

        function editCurrentCharacterCard() {
            const chat = getCurrentChat(); if (chat.mode === 'group') { alert('群聊模式请用群聊管理'); return; }
            fillCharacterForm(chat.characterCard || {}); delete document.getElementById('character-card-overlay').dataset.editTemplateIndex;
            document.getElementById('character-card-overlay').style.display = 'flex'; closeSidebar();
        }
        function saveCharacterCard() {
            const chat = getCurrentChat(); if (chat.mode === 'group') { alert('群聊模式无法设置单角色卡'); return; }
            chat.characterCard = collectCharacterForm();
            const editIndex = document.getElementById('character-card-overlay').dataset.editTemplateIndex;
            if (editIndex !== undefined && editIndex !== '') { templates[editIndex].card = chat.characterCard; templates[editIndex].name = chat.characterCard.name || '未命名'; saveTemplates(); delete document.getElementById('character-card-overlay').dataset.editTemplateIndex; }
            saveData(); closeOverlay('character-card-overlay'); refreshUI();
        }
        function clearCharacterCard() { if (!confirm('清除AI角色卡？')) return; const chat = getCurrentChat(); chat.characterCard = {}; chat.mode = 'single'; chat.groupCards = []; saveData(); closeOverlay('character-card-overlay'); refreshUI(); }

        function editCurrentWritingReq() { document.getElementById('writing-req-input').value = getCurrentChat().writingRequirement || ''; document.getElementById('writing-req-overlay').style.display = 'flex'; closeSidebar(); }
        function saveWritingReq() { getCurrentChat().writingRequirement = document.getElementById('writing-req-input').value.trim(); saveData(); closeOverlay('writing-req-overlay'); refreshUI(); }
        function clearWritingReq() { if (!confirm('清除写作要求？')) return; getCurrentChat().writingRequirement = ''; saveData(); closeOverlay('writing-req-overlay'); refreshUI(); }

        function manageGroupChat() {
            const container = document.getElementById('group-role-selection'); container.innerHTML = '';
            if (templates.length === 0) { container.innerHTML = '<p>请先在模板库存角色</p>'; }
            else { const chat = getCurrentChat(); const selected = chat.mode==='group' ? chat.groupCards.map(c=>c.name) : [];
                templates.forEach(t => { const div = document.createElement('div'); div.className = 'role-checkbox-item';
                    div.innerHTML = `<input type="checkbox" id="grole-${t.id}" value="${t.id}" ${selected.includes(t.card.name)?'checked':''}><label>${escapeHtml(t.name)}</label>`; container.appendChild(div); }); }
            document.getElementById('group-chat-overlay').style.display = 'flex'; closeSidebar();
        }
        function saveGroupChatSettings() {
            const checked = document.querySelectorAll('#group-role-selection input:checked');
            if (checked.length === 0) { alert('至少选一个角色'); return; }
            const ids = Array.from(checked).map(cb=>cb.value);
            const cards = templates.filter(t=>ids.includes(t.id)).map(t=>JSON.parse(JSON.stringify(t.card)));
            const chat = getCurrentChat(); chat.mode = 'group'; chat.characterCard = {}; chat.groupCards = cards;
            saveData(); closeOverlay('group-chat-overlay'); refreshUI();
        }
        function disableGroupChat() { if (!confirm('切回单角色？')) return; const chat = getCurrentChat(); chat.mode = 'single'; chat.groupCards = []; saveData(); closeOverlay('group-chat-overlay'); refreshUI(); }

        function editGlobalDefaults() {
            const u = globalDefaults.userCard || {};
            document.getElementById('g-user-name').value = u.name || ''; document.getElementById('g-user-gender').value = u.gender || '';
            document.getElementById('g-user-age').value = u.age || ''; document.getElementById('g-user-personality').value = u.personality || '';
            document.getElementById('g-user-appearance').value = u.appearance || ''; document.getElementById('g-user-relation').value = u.relation || '';
            document.getElementById('g-user-extra').value = u.extra || '';
            const c = globalDefaults.characterCard || {};
            document.getElementById('g-char-name').value = c.name || ''; document.getElementById('g-char-gender').value = c.gender || '';
            document.getElementById('g-char-age').value = c.age || ''; document.getElementById('g-char-personality').value = c.personality || '';
            document.getElementById('g-char-appearance').value = c.appearance || ''; document.getElementById('g-char-attitude').value = c.attitude || '';
            document.getElementById('g-char-bottom-line').value = c.bottomLine || ''; document.getElementById('g-char-extra').value = c.extra || '';
            document.getElementById('g-writing-req').value = globalDefaults.writingRequirement || '';
            document.getElementById('global-defaults-overlay').style.display = 'flex'; closeSidebar();
        }
        function saveGlobalDefaults() {
            globalDefaults.userCard = { name: document.getElementById('g-user-name').value.trim(), gender: document.getElementById('g-user-gender').value.trim(), age: document.getElementById('g-user-age').value.trim(), personality: document.getElementById('g-user-personality').value.trim(), appearance: document.getElementById('g-user-appearance').value.trim(), relation: document.getElementById('g-user-relation').value.trim(), extra: document.getElementById('g-user-extra').value.trim() };
            globalDefaults.characterCard = { name: document.getElementById('g-char-name').value.trim(), gender: document.getElementById('g-char-gender').value.trim(), age: document.getElementById('g-char-age').value.trim(), personality: document.getElementById('g-char-personality').value.trim(), appearance: document.getElementById('g-char-appearance').value.trim(), attitude: document.getElementById('g-char-attitude').value.trim(), bottomLine: document.getElementById('g-char-bottom-line').value.trim(), extra: document.getElementById('g-char-extra').value.trim() };
            globalDefaults.writingRequirement = document.getElementById('g-writing-req').value.trim();
            localStorage.setItem(GLOBAL_DEFAULTS_KEY, JSON.stringify(globalDefaults));
            closeOverlay('global-defaults-overlay'); alert('已保存');
        }

        function showExportDialog() { document.getElementById('export-overlay').style.display = 'flex'; }
        function exportChat(format) {
            const chat = getCurrentChat(); if (chat.messages.length === 0) { alert('对话为空'); return; }
            const card = chat.characterCard || {}, userCard = chat.userCard || {};
            const header = `角色：${card.name||'AI'}\n用户：${userCard.name||'我'}\n\n---\n\n`;
            const body = chat.messages.map(m => `【${m.role==='user'?(userCard.name||'我'):(m.roleName||card.name||'AI')}】\n${m.content}\n`).join('\n');
            let content = header + body, filename = '对话', mimeType = 'text/plain';
            if (format === 'txt') { filename += '.txt'; }
            else if (format === 'md') { filename += '.md'; mimeType = 'text/markdown'; }
            else if (format === 'json') { content = JSON.stringify(chat,null,2); filename += '.json'; mimeType = 'application/json'; }
            else if (format === 'html') { content = `<html><body><pre>${escapeHtml(header+body)}</pre></body></html>`; filename += '.html'; mimeType = 'text/html'; }
            const blob = new Blob([content],{type:mimeType+';charset=utf-8'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename;
            document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href);
            closeOverlay('export-overlay');
        }

        function buildSystemPrompt() {
            const chat = getCurrentChat(); let parts = []; const userCard = chat.userCard || {};
            if (userCard.name) {
                parts.push(`【关于正在与你对话的用户】他/她是${userCard.name}。`);
                if (userCard.gender) parts.push(`性别：${userCard.gender}。`); if (userCard.age) parts.push(`年龄：${userCard.age}。`);
                if (userCard.personality) parts.push(`性格：${userCard.personality}。`); if (userCard.appearance) parts.push(`外貌：${userCard.appearance}。`);
                if (userCard.relation) parts.push(`与你的关系：${userCard.relation}。`); if (userCard.extra) parts.push(`补充：${userCard.extra}。`);
                parts.push('请根据以上设定对话。');
            }
            if (chat.mode === 'group' && chat.groupCards && chat.groupCards.length > 0) {
                parts.push('你参与群聊，同时扮演以下角色。格式：【角色名】: 发言。');
                chat.groupCards.forEach(c => { let d=`${c.name}：`; if(c.gender)d+=`性别${c.gender}，`; if(c.age)d+=`年龄${c.age}，`; if(c.personality)d+=`性格：${c.personality}，`; if(c.attitude)d+=`态度：${c.attitude}，`; if(c.bottomLine)d+=`底线：${c.bottomLine}，`; if(c.extra)d+=`补充：${c.extra}`; parts.push(d); });
            } else { const card = chat.characterCard || {}; if (card.name) { parts.push(`你扮演${card.name}。`); if(card.gender)parts.push(`性别：${card.gender}。`); if(card.age)parts.push(`年龄：${card.age}。`); if(card.personality)parts.push(`性格：${card.personality}。`); if(card.appearance)parts.push(`外貌：${card.appearance}。`); if(card.attitude)parts.push(`态度：${card.attitude}。`); if(card.bottomLine)parts.push(`底线：${card.bottomLine}。`); if(card.extra)parts.push(`补充：${card.extra}。`); parts.push('严格按照设定回复。'); } }
            if (chat.writingRequirement) parts.push(`【写作要求】${chat.writingRequirement}`);
            return parts.join('\n');
        }
        function parseGroupReply(content, groupCards) {
            const replies = []; const regex = /【(.+?)】[:：]\s*([\s\S]*?)(?=\n【|$)/g; let m;
            while ((m = regex.exec(content)) !== null) { const name = m[1].trim(), text = m[2].trim(); const card = groupCards.find(c=>c.name===name); replies.push({ roleName: name, content: text, color: card ? stringToColor(name) : '#666' }); }
            return replies;
        }
        function stringToColor(s) { let h=0; for(let i=0;i<s.length;i++)h=s.charCodeAt(i)+((h<<5)-h); let c='#'; for(let i=0;i<3;i++){c+=('00'+((h>>(i*8))&0xFF).toString(16)).substr(-2);} return c; }

        async function sendMessage() {
            const content = userInputEl.value.trim(); if (!content) return; if (!apiKey) { showApiKeySetup(); return; }
            const chat = getCurrentChat();
            if (chat.messages.length === 0) { chat.title = content.substring(0,15)+(content.length>15?'...':''); renderChatList(); }
            chat.messages.push({ role: 'user', content: content });
            addMessageBubble('user', chat.userCard?.name || '我', content, null);
            userInputEl.value = ''; userInputEl.style.height = 'auto'; scrollToBottom();

            const thinkingDiv = document.createElement('div'); thinkingDiv.className = 'msg assistant'; thinkingDiv.textContent = '思考中...'; chatBoxEl.appendChild(thinkingDiv); scrollToBottom();

            const sp = buildSystemPrompt(); let apiMsgs = []; if (sp) apiMsgs.push({ role: 'system', content: sp }); apiMsgs = apiMsgs.concat(chat.messages);
            try {
                const res = await fetch('https://api.deepseek.com/v1/chat/completions', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` }, body: JSON.stringify({ model: 'deepseek-chat', messages: apiMsgs, stream: false }) });
                const data = await res.json(); thinkingDiv.remove();
                if (data.choices && data.choices[0].message) {
                    const ac = data.choices[0].message.content;
                    if (chat.mode === 'group' && chat.groupCards && chat.groupCards.length > 0) {
                        const replies = parseGroupReply(ac, chat.groupCards);
                        if (replies.length > 0) { replies.forEach(r => { chat.messages.push({ role: 'assistant', roleName: r.roleName, content: r.content, color: r.color }); addMessageBubble('assistant', r.roleName, r.content, r.color); }); }
                        else { chat.messages.push({ role: 'assistant', roleName: '群聊', content: ac, color: '#666' }); addMessageBubble('assistant', '群聊', ac, '#666'); }
                    } else { chat.messages.push({ role: 'assistant', content: ac }); addMessageBubble('assistant', chat.characterCard?.name || 'AI', ac, null); }
                } else { const em = '出错：'+JSON.stringify(data); chat.messages.push({ role: 'assistant', content: em }); addMessageBubble('assistant', '系统', em, '#e53935'); }
            } catch (err) { thinkingDiv.remove(); const em = '网络错误：'+err.message; chat.messages.push({ role: 'assistant', content: em }); addMessageBubble('assistant', '系统', em, '#e53935'); }
            saveData(); scrollToBottom();
        }

        userInputEl.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px'; });
        userInputEl.addEventListener('keydown', function(e) { if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); sendMessage(); } });

        function switchChat(id) { currentChatId = id; saveData(); refreshUI(); closeSidebar(); }
        function createNewChat() {
            const gd = getGlobalDefaults();
            chats.unshift({ id: generateId(), title: '新对话', messages: [], userCard: gd.userCard?JSON.parse(JSON.stringify(gd.userCard)):{}, characterCard: gd.characterCard?JSON.parse(JSON.stringify(gd.characterCard)):{}, writingRequirement: gd.writingRequirement||'', mode: 'single', groupCards: [] });
            currentChatId = chats[0].id; saveData(); refreshUI(); userInputEl.focus(); closeSidebar();
        }
        function deleteChat(id) { if (chats.length <= 1) { alert('至少保留一个对话'); return; } if (!confirm('删除此对话？')) return; chats = chats.filter(c=>c.id!==id); if (currentChatId===id) currentChatId=chats[0].id; saveData(); refreshUI(); }
        function escapeHtml(text) { return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        loadData(); applyTheme(); applyBackground(); refreshUI();
    </script>
</body>
