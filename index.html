<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>听澜 · 角色工坊</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f0f2f5; --sidebar-bg: #fff; --main-bg: #fff; --border: #e0e0e0;
            --text: #333; --text-secondary: #555; --user-bg: #e3f2fd; --user-color: #0d47a1;
            --ai-bg: #f1f1f1; --ai-color: #1b1b1b; --input-border: #ddd; --btn-bg: #f5f5f5;
            --btn-hover: #e8e8e8; --overlay-bg: rgba(0,0,0,0.5);
        }
        .dark-mode {
            --bg: #1a1a2e; --sidebar-bg: #16213e; --main-bg: #1a1a2e; --border: #0f3460;
            --text: #e0e0e0; --text-secondary: #aaa; --user-bg: #1a3a5c; --user-color: #90caf9;
            --ai-bg: #2a2a4a; --ai-color: #d0d0d0; --input-border: #0f3460; --btn-bg: #2a2a4a;
            --btn-hover: #3a3a5a;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }
        .sidebar {
            width: 260px; min-width: 260px; background: var(--sidebar-bg);
            border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0;
            overflow-y: auto; transition: transform 0.3s, background 0.3s; z-index: 20;
        }
        .sidebar-header {
            padding: 12px 14px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: var(--sidebar-bg); z-index: 1;
        }
        .sidebar-header h3 { font-size: 16px; font-weight: 600; }
        .new-chat-btn {
            background: #1a73e8; border: none; color: white;
            width: 32px; height: 32px; border-radius: 50%; font-size: 20px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .chat-list { flex: 1; overflow-y: auto; padding: 6px; }
        .chat-item {
            padding: 10px 12px; margin: 3px 0; border-radius: 8px;
            cursor: pointer; font-size: 14px; display: flex;
            justify-content: space-between; align-items: center; word-break: break-word;
        }
        .chat-item:hover { background: var(--btn-hover); }
        .chat-item.active { background: #e3f2fd; font-weight: 500; }
        .dark-mode .chat-item.active { background: #1a3a5c; }
        .rename-chat, .delete-chat {
            visibility: hidden; background: none; border: none; color: #999;
            font-size: 14px; cursor: pointer; padding: 0 4px; line-height: 1;
        }
        .chat-item:hover .rename-chat, .chat-item:hover .delete-chat { visibility: visible; }
        .rename-chat:hover, .delete-chat:hover { color: #1a73e8; }
        .delete-chat:hover { color: #e53935; }
        .toggle-footer-btn {
            display: block; width: 100%; padding: 8px; margin: 4px 0;
            border: 1px solid var(--border); background: var(--btn-bg);
            color: var(--text); border-radius: 8px; cursor: pointer; font-size: 13px; text-align: center;
        }
        .sidebar-footer {
            border-top: 1px solid var(--border); padding: 6px; background: var(--sidebar-bg);
        }
        .sidebar-footer button {
            display: block; width: 100%; padding: 9px 10px; margin: 3px 0;
            border: none; background: var(--btn-bg); color: var(--text);
            border-radius: 8px; cursor: pointer; font-size: 13px; text-align: left;
        }
        .sidebar-footer button:hover { background: var(--btn-hover); }
        .main {
            flex: 1; display: flex; flex-direction: column; background: var(--main-bg);
            min-width: 0; position: relative; transition: background 0.3s;
        }
        .chat-bg-layer {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover; background-position: center; background-repeat: no-repeat;
            opacity: 0.15; filter: blur(2px); z-index: 0; pointer-events: none;
        }
        .chat-header {
            padding: 10px 14px; border-bottom: 1px solid var(--border);
            font-size: 14px; font-weight: 500; color: var(--text-secondary);
            display: flex; justify-content: space-between; align-items: center;
            position: relative; z-index: 1; background: var(--main-bg);
        }
        .menu-toggle {
            display: none; background: none; border: none;
            font-size: 22px; cursor: pointer; color: var(--text); padding: 0 6px;
        }
        .export-btn {
            background: transparent; border: 1px solid var(--input-border);
            color: var(--text-secondary); padding: 4px 10px;
            border-radius: 14px; cursor: pointer; font-size: 12px;
        }
        .chat-title-text { cursor: pointer; }
        .info-bar {
            padding: 4px 14px; font-size: 11px; color: var(--text-secondary);
            display: flex; align-items: center; gap: 8px; flex-shrink: 0;
            border-bottom: 1px solid var(--border); position: relative; z-index: 1;
            background: var(--main-bg); overflow-x: auto; white-space: nowrap;
        }
        .info-bar span { opacity: 0.8; }
        #chat-box {
            flex: 1; overflow-y: auto; padding: 12px 10px;
            display: flex; flex-direction: column; gap: 12px; position: relative; z-index: 1;
        }
        .message-wrapper { display: flex; flex-direction: column; position: relative; }
        .message-wrapper.user-wrapper { align-items: flex-end; }
        .message-wrapper.assistant-wrapper { align-items: flex-start; }
        .msg {
            max-width: 85%; padding: 10px 14px; border-radius: 16px;
            line-height: 1.5; font-size: 14px; word-break: break-word; white-space: pre-wrap;
        }
        .user-msg { background: var(--user-bg); color: var(--user-color); border-bottom-right-radius: 4px; cursor: pointer; }
        .assistant-msg { background: var(--ai-bg); color: var(--ai-color); border-bottom-left-radius: 4px; }
        .msg-actions {
            display: flex; gap: 4px; margin-top: 2px; opacity: 0; transition: opacity 0.2s;
        }
        .message-wrapper:hover .msg-actions { opacity: 1; }
        .msg-action-btn {
            background: none; border: 1px solid var(--input-border);
            color: var(--text-secondary); padding: 2px 8px;
            border-radius: 10px; cursor: pointer; font-size: 11px;
        }
        .msg-action-btn:hover { background: var(--btn-hover); }
        .msg-edit-input {
            width: 100%; max-width: 85%; padding: 8px 12px;
            border: 1px solid #1a73e8; border-radius: 14px;
            font-size: 14px; font-family: inherit; resize: none;
            background: var(--main-bg); color: var(--text);
        }
        .input-area {
            display: flex; align-items: flex-end; gap: 6px;
            padding: 10px 14px; border-top: 1px solid var(--border);
            position: relative; z-index: 1; background: var(--main-bg);
        }
        #user-input {
            flex: 1; padding: 10px 14px; border: 1px solid var(--input-border);
            border-radius: 20px; font-size: 14px; font-family: inherit;
            resize: none; max-height: 100px; overflow-y: auto; line-height: 1.4;
            background: var(--main-bg); color: var(--text);
        }
        #user-input:focus { outline: none; border-color: #1a73e8; }
        .send-btn {
            background: #1a73e8; border: none; color: white;
            width: 42px; height: 42px; border-radius: 50%; font-size: 18px; cursor: pointer; flex-shrink: 0;
        }
        .sidebar-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 15;
        }
        @media (max-width: 768px) {
            .sidebar { position: fixed; top: 0; left: 0; height: 100%; transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
            .sidebar-overlay.show { display: block; }
            .menu-toggle { display: inline-block; }
            .chat-header { padding: 8px 10px; font-size: 13px; }
            #chat-box { padding: 10px 8px; gap: 10px; }
            .msg { max-width: 90%; font-size: 13px; padding: 8px 12px; }
            .input-area { padding: 8px 10px; }
            #user-input { font-size: 13px; padding: 8px 12px; }
            .send-btn { width: 38px; height: 38px; font-size: 16px; }
            .msg-actions { opacity: 1; }
        }
        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--overlay-bg); justify-content: center; align-items: center; z-index: 100;
        }
        .dialog-box {
            background: var(--sidebar-bg); color: var(--text);
            padding: 20px; border-radius: 16px;
            width: 92%; max-width: 520px; max-height: 85vh; overflow-y: auto;
        }
        .dialog-box h3 { margin-bottom: 14px; font-size: 16px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 3px; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 8px 10px; border: 1px solid var(--input-border);
            border-radius: 8px; font-size: 14px; font-family: inherit;
            background: var(--main-bg); color: var(--text);
        }
        .form-group textarea { resize: vertical; min-height: 50px; }
        .dialog-box button {
            padding: 7px 16px; margin-right: 8px; margin-top: 6px;
            border-radius: 8px; border: none; cursor: pointer; font-size: 13px;
        }
        .btn-primary { background: #1a73e8; color: white; }
        .btn-secondary { background: var(--btn-bg); color: var(--text); }
        .btn-danger { background: #e53935; color: white; }
        .btn-outline { background: transparent; color: #1a73e8; border: 1px solid #1a73e8; }
        .range-group { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
        .range-group label { min-width: 60px; font-size: 12px; }
        .range-group input[type="range"] { flex: 1; }
        .bg-preview {
            width: 100%; height: 80px; background-size: cover; background-position: center;
            border-radius: 8px; margin: 8px 0; border: 1px solid var(--input-border);
        }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h3>🎭 听澜</h3>
            <button class="new-chat-btn" onclick="createNewChat()" title="新建对话">+</button>
        </div>
        <div class="chat-list" id="chat-list"></div>
        <button class="toggle-footer-btn" onclick="toggleSidebarFooter()">⚙️ 更多功能 ▾</button>
        <div class="sidebar-footer" id="sidebar-footer" style="display:none;">
            <button onclick="editCurrentUserCard()">🥰 我的角色设定</button>
            <button onclick="editCurrentCharacterCard()">🪪 AI 角色设定</button>
            <button onclick="editCurrentSceneCard()">🌍 对话背景设定</button>
            <button onclick="editDefaultFeatures()">📋 默认功能设定</button>
            <button onclick="editAutoPush()">❤️ 角色主动性</button>
            <button onclick="openUserTemplateLibrary()">🥰 我的角色库</button>
            <button onclick="openTemplateLibrary()">📚 AI 角色模板库</button>
            <button onclick="openBackgroundSettings()">🖼️ 更换背景</button>
            <button onclick="toggleDarkMode()">🌓 暗黑模式</button>
            <button onclick="showApiKeySetup()">🔑 API Key</button>
            <button onclick="closeSidebar()" style="color:#e53935;">✕ 关闭菜单</button>
        </div>
    </div>

    <div class="main">
        <div class="chat-bg-layer" id="chat-bg-layer"></div>
        <div class="chat-header">
            <button class="menu-toggle" onclick="openSidebar()">☰</button>
            <span id="chat-title" class="chat-title-text" ondblclick="renameCurrentChat()" title="双击重命名">DeepSeek</span>
            <button class="export-btn" onclick="showExportDialog()">📥</button>
        </div>
 <div class="info-bar" id="info-bar">
    <span id="info-default" onclick="editDefaultFeatures()" style="cursor:pointer;" title="点击编辑默认功能">📋 默认功能：未设定</span>
    <span id="info-scene" onclick="editCurrentSceneCard()" style="cursor:pointer;" title="点击编辑对话背景">🌍 背景：未设定</span>
</div>
        <div id="chat-box"></div>
        <div class="input-area">
            <textarea id="user-input" rows="1" placeholder="输入消息..."></textarea>
            <button class="send-btn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <!-- 用户角色卡弹窗（升级版） -->
    <div class="overlay" id="user-card-overlay">
        <div class="dialog-box"><h3>🥰 我的角色设定</h3>
            <div class="form-group"><label>姓名</label><input id="user-name"></div>
            <div class="form-group"><label>性别</label><input id="user-gender"></div>
            <div class="form-group"><label>年龄</label><input id="user-age"></div>
            <div class="form-group"><label>身份（该世界观下）</label><input id="user-identity"></div>
            <div class="form-group"><label>外貌</label><textarea id="user-appearance"></textarea></div>
            <div class="form-group"><label>性格</label><textarea id="user-personality"></textarea></div>
            <div class="form-group"><label>核心人格</label><textarea id="user-core-personality"></textarea></div>
            <div class="form-group"><label>人物经历</label><textarea id="user-backstory"></textarea></div>
            <div class="form-group"><label>对 AI 角色的感情/态度</label><textarea id="user-attitude"></textarea></div>
            <div class="form-group"><label>补充设定</label><textarea id="user-extra"></textarea></div>
            <div>
                <button class="btn-primary" onclick="saveUserCard()">保存</button>
                <button class="btn-secondary" onclick="closeOverlay('user-card-overlay')">取消</button>
                <button class="btn-danger" onclick="clearUserCard()">清除</button>
                <button class="btn-outline" onclick="saveUserCardAsTemplate()">💾 保存为我的模板</button>
            </div>
        </div>
    </div>
    <!-- AI角色卡弹窗（升级版） -->
    <div class="overlay" id="character-card-overlay">
        <div class="dialog-box"><h3>🪪 AI 角色设定</h3>
            <div class="form-group"><label>姓名</label><input id="char-name"></div>
            <div class="form-group"><label>性别</label><input id="char-gender"></div>
            <div class="form-group"><label>年龄</label><input id="char-age"></div>
            <div class="form-group"><label>身份（该世界观下）</label><input id="char-identity"></div>
            <div class="form-group"><label>外貌</label><textarea id="char-appearance"></textarea></div>
            <div class="form-group"><label>性格</label><textarea id="char-personality"></textarea></div>
            <div class="form-group"><label>核心人格</label><textarea id="char-core-personality"></textarea></div>
            <div class="form-group"><label>人物经历</label><textarea id="char-backstory"></textarea></div>
            <div class="form-group"><label>对用户的感情/态度</label><textarea id="char-attitude"></textarea></div>
            <div class="form-group"><label>补充设定</label><textarea id="char-extra"></textarea></div>
            <div>
                <button class="btn-primary" onclick="saveCharacterCard()">保存</button>
                <button class="btn-secondary" onclick="closeOverlay('character-card-overlay')">取消</button>
                <button class="btn-danger" onclick="clearCharacterCard()">清除</button>
                <button class="btn-outline" onclick="saveCardAsTemplate()">💾 保存为模板</button>
            </div>
        </div>
    </div>
    <!-- 对话背景设定弹窗 -->
    <div class="overlay" id="scene-card-overlay">
        <div class="dialog-box"><h3>🌍 对话背景设定</h3>
            <div class="form-group"><label>世界观背景</label><textarea id="scene-world"></textarea></div>
            <div class="form-group"><label>前置剧情</label><textarea id="scene-plot"></textarea></div>
            <div class="form-group"><label>对话开始时场景</label><textarea id="scene-opening"></textarea></div>
            <div>
                <button class="btn-primary" onclick="saveSceneCard()">保存</button>
                <button class="btn-secondary" onclick="closeOverlay('scene-card-overlay')">取消</button>
                <button class="btn-danger" onclick="clearSceneCard()">清除</button>
            </div>
        </div>
    </div>
    <!-- 默认功能设定弹窗 -->
    <div class="overlay" id="default-features-overlay">
        <div class="dialog-box"><h3>📋 默认功能设定</h3>
            <p style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;">此设定优先级最高，所有对话都会自动应用。</p>
            <div class="form-group"><label>写作要求</label><textarea id="df-writing"></textarea></div>
            <div class="form-group"><label>对话要求</label><textarea id="df-dialogue"></textarea></div>
            <div class="form-group"><label>对话主旨</label><textarea id="df-theme"></textarea></div>
            <div class="form-group"><label>语言禁止词</label><textarea id="df-banned-words"></textarea></div>
            <div class="form-group"><label>对话禁忌</label><textarea id="df-taboos"></textarea></div>
            <div class="form-group"><label>辅助设定</label><textarea id="df-auxiliary"></textarea></div>
            <div>
                <button class="btn-primary" onclick="saveDefaultFeatures()">保存</button>
                <button class="btn-secondary" onclick="closeOverlay('default-features-overlay')">取消</button>
            </div>
        </div>
    </div>
    <!-- 角色主动性弹窗 -->
    <div class="overlay" id="auto-push-overlay">
        <div class="dialog-box"><h3>❤️ 角色主动性</h3>
            <p style="font-size:12px;color:var(--text-secondary);margin-bottom:12px;">当对话沉默一段时间后，AI角色将主动推动剧情。</p>
            <div class="form-group">
                <label><input type="checkbox" id="ap-enabled"> 开启角色主动性</label>
            </div>
            <div class="range-group">
                <label>触发间隔 (分钟)</label>
                <input type="range" id="ap-interval" min="5" max="240" value="30" oninput="document.getElementById('ap-interval-val').textContent = this.value">
                <span id="ap-interval-val">30</span>
            </div>
            <div class="form-group">
                <label>暂停开始 (时，0-23)</label>
                <input type="number" id="ap-pause-start" min="0" max="23" value="22">
            </div>
            <div class="form-group">
                <label>暂停结束 (时，0-23)</label>
                <input type="number" id="ap-pause-end" min="0" max="23" value="8">
            </div>
            <p style="font-size:11px;color:var(--text-secondary);">暂停时段内不会自动推送。例如 22 到 8 表示晚上 10 点到早上 8 点不推送。</p>
            <div>
                <button class="btn-primary" onclick="saveAutoPush()">保存</button>
                <button class="btn-secondary" onclick="closeOverlay('auto-push-overlay')">取消</button>
            </div>
        </div>
    </div>
    <!-- 背景图片弹窗 -->
    <div class="overlay" id="bg-settings-overlay">
        <div class="dialog-box"><h3>🖼️ 聊天背景设置</h3><input type="file" id="bg-file-input" accept="image/*" style="display:none;" onchange="handleBgFileSelect(event)"><div class="bg-preview" id="bg-preview">暂无背景</div><button class="btn-outline" onclick="document.getElementById('bg-file-input').click()">📁 选择图片</button><button class="btn-danger" onclick="removeBackground()" style="margin-left:6px;">移除背景</button><div class="range-group"><label>透明度</label><input type="range" id="bg-opacity" min="5" max="50" value="15" oninput="updateBgPreview()"><span id="bg-opacity-val">15%</span></div><div class="range-group"><label>模糊度</label><input type="range" id="bg-blur" min="0" max="10" value="2" oninput="updateBgPreview()"><span id="bg-blur-val">2px</span></div><div><button class="btn-primary" onclick="saveBackground()">保存</button><button class="btn-secondary" onclick="closeOverlay('bg-settings-overlay')">取消</button></div></div>
    </div>
    <!-- API Key 弹窗 -->
    <div class="overlay" id="api-key-overlay">
        <div class="dialog-box"><h3>🔑 设置 API Key</h3><input type="password" id="api-key-input" placeholder="sk-..." style="width:100%;padding:10px;margin:10px 0;border:1px solid var(--input-border);border-radius:8px;font-size:14px;background:var(--main-bg);color:var(--text);"><button class="btn-primary" onclick="saveApiKey()">保存</button><button class="btn-secondary" onclick="closeOverlay('api-key-overlay')">取消</button></div>
    </div>
    <!-- 导出弹窗 -->
    <div class="overlay" id="export-overlay">
        <div class="dialog-box"><h3>📥 导出对话</h3><button class="btn-outline" onclick="exportChat('txt')" style="display:block;width:100%;margin:6px 0;padding:10px;">📄 纯文本</button><button class="btn-outline" onclick="exportChat('md')" style="display:block;width:100%;margin:6px 0;padding:10px;">📝 Markdown</button><button class="btn-outline" onclick="exportChat('json')" style="display:block;width:100%;margin:6px 0;padding:10px;">💾 JSON</button><button class="btn-outline" onclick="exportChat('html')" style="display:block;width:100%;margin:6px 0;padding:10px;">🌐 HTML</button><button class="btn-secondary" onclick="closeOverlay('export-overlay')" style="margin-top:8px;">取消</button></div>
    </div>
    <!-- AI模板库弹窗 -->
    <div class="overlay" id="template-library-overlay">
        <div class="dialog-box"><h3>📚 AI 角色模板库</h3><div id="template-list"></div><button class="btn-secondary" onclick="closeOverlay('template-library-overlay')" style="margin-top:10px;">关闭</button></div>
    </div>
    <!-- 用户模板库弹窗 -->
    <div class="overlay" id="user-template-library-overlay">
        <div class="dialog-box"><h3>🥰 我的角色库</h3><div id="user-template-list"></div><button class="btn-secondary" onclick="closeOverlay('user-template-library-overlay')" style="margin-top:10px;">关闭</button></div>
    </div>

    <script>
        // ==================== 数据存储键 ====================
        const STORAGE_KEY = 'deepseek_chats_v11';
        const API_KEY_STORAGE = 'deepseek_api_key';
        const TEMPLATES_KEY = 'deepseek_char_templates';
        const USER_TEMPLATES_KEY = 'deepseek_user_templates';
        const BG_SETTINGS_KEY = 'deepseek_bg_settings';
        const DARK_MODE_KEY = 'deepseek_dark_mode';
        const DEFAULT_FEATURES_KEY = 'deepseek_default_features';
        const AUTO_PUSH_KEY = 'deepseek_auto_push';

        // ==================== 全局状态 ====================
        let chats = [];
        let currentChatId = null;
        let templates = [];
        let userTemplates = [];
        let bgSettings = { imageDataUrl: '', opacity: 15, blur: 2 };

                chats.forEach(c => {
                    if (!c.userCard) c.userCard = {};
                    if (!c.characterCard) c.characterCard = {};
                    if (!c.sceneCard) c.sceneCard = {};
                });
            } else {
                chats = [{
                    id: generateId(), title: '新对话', messages: [],
                    userCard: {}, characterCard: {}, sceneCard: {}
                }];
            }
            const savedId = localStorage.getItem('current_chat_id');
            if (savedId && chats.find(c => c.id === savedId)) { currentChatId = savedId; }
            else { currentChatId = chats[0].id; }
            const tSaved = localStorage.getItem(TEMPLATES_KEY);
            if (tSaved) templates = JSON.parse(tSaved);
            const utSaved = localStorage.getItem(USER_TEMPLATES_KEY);
            if (utSaved) userTemplates = JSON.parse(utSaved);
            const bgSaved = localStorage.getItem(BG_SETTINGS_KEY);
            if (bgSaved) bgSettings = JSON.parse(bgSaved);
            isDarkMode = localStorage.getItem(DARK_MODE_KEY) === 'true';
            const dfSaved = localStorage.getItem(DEFAULT_FEATURES_KEY);
            if (dfSaved) defaultFeatures = JSON.parse(dfSaved);
            const apSaved = localStorage.getItem(AUTO_PUSH_KEY);
            if (apSaved) autoPushSettings = JSON.parse(apSaved);
            const currentChat = getCurrentChat();
            if (currentChat && currentChat.messages.length > 0) {
                for (let i = currentChat.messages.length - 1; i >= 0; i--) {
                    if (currentChat.messages[i].role === 'user') {
                        lastUserMessageTime = Date.now();
                        break;
                    }
                }
            } else {
                lastUserMessageTime = Date.now();
            }
        }

        function renderMessages() {
            const chat = getCurrentChat(); chatBoxEl.innerHTML = '';
            const card = chat.characterCard || {}, userCard = chat.userCard || {};
            let title = '';
            if (userCard.name) title += '🥰'+userCard.name+' ↔ ';
            if (card.name) title += '🎭'+card.name;
            if (!title) title = chat.title || '听澜';
            chatTitleEl.textContent = title;
            const hasDefault = Object.values(defaultFeatures).some(v => v);
            infoDefault.textContent = hasDefault ? '📋 默认功能：已设定' : '📋 默认功能：未设定';
            const hasScene = chat.sceneCard && (chat.sceneCard.world || chat.sceneCard.plot || chat.sceneCard.opening);
            infoScene.textContent = hasScene ? '🌍 背景：已设定' : '🌍 背景：未设定';
            if (chat.messages.length === 0) { chatBoxEl.innerHTML = '<div style="color:var(--text-secondary);text-align:center;margin-top:30px;">开始对话吧</div>'; return; }
            chat.messages.forEach((msg, index) => {
                if (msg.role === 'user') { addUserMessageBubble(msg.content, index); }
                else { addAssistantMessageBubble(msg.roleName || 'AI', msg.content, null, index, msg.autoPush); }
            });

        function addUserMessageBubble(text, index) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper user-wrapper';
            wrapper.dataset.msgIndex = index;
            const bubble = document.createElement('div');
            bubble.className = 'msg user-msg';
            bubble.textContent = text;
            bubble.onclick = function() { startEditUserMessage(index, text, wrapper); };
            const actions = document.createElement('div');
            actions.className = 'msg-actions';
            actions.innerHTML = `<button class="msg-action-btn" onclick="startEditUserMessage(${index}, '${escapeHtml(text).replace(/'/g, "\\'")}', this.parentElement.parentElement)">✏️ 编辑</button>`;
            wrapper.appendChild(bubble);
            wrapper.appendChild(actions);
            chatBoxEl.appendChild(wrapper);
        }

        function addAssistantMessageBubble(roleName, text, color, index, isAutoPush = false) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper assistant-wrapper';
            wrapper.dataset.msgIndex = index;
            const bubble = document.createElement('div');
            bubble.className = 'msg assistant-msg';
            let prefix = isAutoPush ? '❤️ ' : '';
            let html = `<strong>${prefix}${escapeHtml(roleName)}：</strong>${escapeHtml(text).replace(/\n/g, '<br>')}`;
            bubble.innerHTML = html;
            const actions = document.createElement('div');
            actions.className = 'msg-actions';
            actions.innerHTML = `<button class="msg-action-btn" onclick="regenerateAnswer(${index})">🔄 刷新</button>`;
            wrapper.appendChild(bubble);
            wrapper.appendChild(actions);
            chatBoxEl.appendChild(wrapper);
        }

        function startEditUserMessage(index, text, wrapper) {
            const chat = getCurrentChat();
            if (index >= chat.messages.length || chat.messages[index].role !== 'user') return;
            const input = document.createElement('textarea');
            input.className = 'msg-edit-input';
            input.value = text;
            input.rows = Math.min(text.split('\n').length, 6);
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); finishEditUserMessage(index, input.value, wrapper); }
                if (e.key === 'Escape') { renderMessages(); }
            });
            input.addEventListener('blur', function() { finishEditUserMessage(index, input.value, wrapper); });
            wrapper.innerHTML = '';
            wrapper.appendChild(input);
            input.focus();
            input.setSelectionRange(input.value.length, input.value.length);
        }

        async function finishEditUserMessage(index, newText, wrapper) {
            const chat = getCurrentChat();
            if (!newText.trim()) { renderMessages(); return; }
            chat.messages[index].content = newText.trim();
            chat.messages = chat.messages.slice(0, index + 1);
            saveData(); renderMessages();
            await regenerateAfterEdit();
        }

        async function regenerateAfterEdit() {
            const chat = getCurrentChat();
            if (chat.messages.length === 0) return;
            const lastMsg = chat.messages[chat.messages.length - 1];
            if (lastMsg.role !== 'user') return;
            await sendMessageInternal(lastMsg.content, true);
        }

        async function regenerateAnswer(index) {
            const chat = getCurrentChat();
            if (index >= chat.messages.length) return;
            const targetMsg = chat.messages[index];
            if (targetMsg.role !== 'assistant') return;
            let userMsgIndex = index - 1;
            while (userMsgIndex >= 0 && chat.messages[userMsgIndex].role !== 'user') { userMsgIndex--; }
            if (userMsgIndex < 0) return;
            const userMsg = chat.messages[userMsgIndex];
            chat.messages = chat.messages.slice(0, index);
            saveData(); renderMessages();
            await sendMessageInternal(userMsg.content, true);
        }

        function deleteUserTemplate(i) { if (!confirm('删除用户模板"'+(userTemplates[i].name||'未命名')+'"？')) return; userTemplates.splice(i,1); saveUserTemplates(); openUserTemplateLibrary(); }

        // ==================== 导出 ====================
        function showExportDialog() { document.getElementById('export-overlay').style.display = 'flex'; }
       function exportChat(format) {
    const chat = getCurrentChat(); if (chat.messages.length === 0) { alert('对话为空'); return; }
    const card = chat.characterCard || {}, userCard = chat.userCard || {}, scene = chat.sceneCard || {};
    
    // 构建完整头部信息
    function buildFullHeader() {
        let h = '';
        // 默认功能
        if (Object.values(defaultFeatures).some(v => v)) {
            h += '【默认功能设定】\n';
            if (defaultFeatures.writing) h += `写作要求：${defaultFeatures.writing}\n`;
            if (defaultFeatures.dialogue) h += `对话要求：${defaultFeatures.dialogue}\n`;
            if (defaultFeatures.theme) h += `对话主旨：${defaultFeatures.theme}\n`;
            if (defaultFeatures.bannedWords) h += `语言禁止词：${defaultFeatures.bannedWords}\n`;
            if (defaultFeatures.taboos) h += `对话禁忌：${defaultFeatures.taboos}\n`;
            if (defaultFeatures.auxiliary) h += `辅助设定：${defaultFeatures.auxiliary}\n`;
            h += '\n';
        }
        // 对话背景
        if (scene.world || scene.plot || scene.opening) {
            h += '【对话背景】\n';
            if (scene.world) h += `世界观：${scene.world}\n`;
            if (scene.plot) h += `前置剧情：${scene.plot}\n`;
            if (scene.opening) h += `开场场景：${scene.opening}\n`;
            h += '\n';
        }
        // AI 角色卡
        if (card.name) {
            h += '【AI 角色】\n';
            h += `姓名：${card.name}\n`;
            if (card.gender) h += `性别：${card.gender}\n`;
            if (card.age) h += `年龄：${card.age}\n`;
            if (card.identity) h += `身份：${card.identity}\n`;
            if (card.personality) h += `性格：${card.personality}\n`;
            if (card.corePersonality) h += `核心人格：${card.corePersonality}\n`;
            if (card.backstory) h += `人物经历：${card.backstory}\n`;
            if (card.attitude) h += `对用户态度：${card.attitude}\n`;
            if (card.extra) h += `补充设定：${card.extra}\n`;
            h += '\n';
        }
        // 用户角色卡
        if (userCard.name) {
            h += '【用户角色】\n';
            h += `姓名：${userCard.name}\n`;
            if (userCard.gender) h += `性别：${userCard.gender}\n`;
            if (userCard.age) h += `年龄：${userCard.age}\n`;
            if (userCard.identity) h += `身份：${userCard.identity}\n`;
            if (userCard.personality) h += `性格：${userCard.personality}\n`;
            if (userCard.corePersonality) h += `核心人格：${userCard.corePersonality}\n`;
            if (userCard.backstory) h += `人物经历：${userCard.backstory}\n`;
            if (userCard.attitude) h += `对AI态度：${userCard.attitude}\n`;
            if (userCard.extra) h += `补充设定：${userCard.extra}\n`;
            h += '\n';
        }
        h += '--- 对话内容 ---\n\n';
        return h;
    }

    const fullHeader = buildFullHeader();
    const body = chat.messages.map(m => `【${m.role==='user'?(userCard.name||'我'):(card.name||'AI')}】\n${m.content}\n`).join('\n');
    let content = fullHeader + body, filename = '对话', mimeType = 'text/plain';
    if (format === 'txt') { filename += '.txt'; }
    else if (format === 'md') { filename += '.md'; mimeType = 'text/markdown'; }
    else if (format === 'json') { 
        content = JSON.stringify({
            defaultFeatures: defaultFeatures,
            sceneCard: scene,
            characterCard: card,
            userCard: userCard,
            messages: chat.messages
        }, null, 2);
        filename += '.json'; mimeType = 'application/json'; 
    }
    else if (format === 'html') { content = `<html><body><pre>${escapeHtml(fullHeader+body)}</pre></body></html>`; filename += '.html'; mimeType = 'text/html'; }
    const blob = new Blob([content],{type:mimeType+';charset=utf-8'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(a.href);
    closeOverlay('export-overlay');
}

        // ==================== AI 对话核心 ====================
        function buildSystemPrompt() {
            const chat = getCurrentChat();
            let parts = [];
            parts.push('【全局规则 · 最高优先级】');
            parts.push('你正在进行角色扮演。请严格遵守以下所有规则。');
            if (defaultFeatures.writing) parts.push(`写作要求：${defaultFeatures.writing}`);
            if (defaultFeatures.dialogue) parts.push(`对话要求：${defaultFeatures.dialogue}`);
            if (defaultFeatures.theme) parts.push(`对话主旨：${defaultFeatures.theme}`);
            if (defaultFeatures.bannedWords) parts.push(`语言禁止词：${defaultFeatures.bannedWords}`);
            if (defaultFeatures.taboos) parts.push(`对话禁忌：${defaultFeatures.taboos}`);
            if (defaultFeatures.auxiliary) parts.push(`辅助设定：${defaultFeatures.auxiliary}`);
            const scene = chat.sceneCard || {};
            if (scene.world || scene.plot || scene.opening) {
                parts.push('\n【对话背景】');
                if (scene.world) parts.push(`世界观：${scene.world}`);
                if (scene.plot) parts.push(`前置剧情：${scene.plot}`);
                if (scene.opening) parts.push(`当前场景：${scene.opening}`);
            }

            if (userCard.name) {
                parts.push('\n【关于正在与你对话的用户】');
                parts.push(`姓名：${userCard.name}`);
                if (userCard.gender) parts.push(`性别：${userCard.gender}`);
                if (userCard.age) parts.push(`年龄：${userCard.age}`);
                if (userCard.identity) parts.push(`身份：${userCard.identity}`);
                if (userCard.appearance) parts.push(`外貌：${userCard.appearance}`);
                if (userCard.personality) parts.push(`性格：${userCard.personality}`);
                if (userCard.corePersonality) parts.push(`核心人格：${userCard.corePersonality}`);
                if (userCard.backstory) parts.push(`人物经历：${userCard.backstory}`);
                if (userCard.attitude) parts.push(`对你的感情/态度：${userCard.attitude}`);
                if (userCard.extra) parts.push(`补充设定：${userCard.extra}`);
                parts.push('请根据以上设定，用符合你们关系的语气和态度与他/她对话。');
            }
            const card = chat.characterCard || {};
            if (card.name) {
                parts.push('\n【你正在扮演的角色】');
                parts.push(`你现在的名字是${card.name}。请完全代入此角色，不要跳出。`);
                if (card.gender) parts.push(`性别：${card.gender}`);
                if (card.age) parts.push(`年龄：${card.age}`);
                if (card.identity) parts.push(`身份：${card.identity}`);
                if (card.appearance) parts.push(`外貌：${card.appearance}`);
                if (card.personality) parts.push(`性格：${card.personality}`);
                if (card.corePersonality) parts.push(`核心人格：${card.corePersonality}`);
                if (card.backstory) parts.push(`人物经历：${card.backstory}`);
                if (card.attitude) parts.push(`对用户的感情/态度：${card.attitude}`);
                if (card.extra) parts.push(`补充设定：${card.extra}`);
                parts.push('请严格按照以上角色设定进行回复，不要脱离角色。');
            }
            return parts.join('\n');
        }

        async function sendMessage() {
            const content = userInputEl.value.trim(); if (!content) return; if (!apiKey) { showApiKeySetup(); return; }
            userInputEl.value = ''; userInputEl.style.height = 'auto';
            await sendMessageInternal(content, false);
        }

        async function sendMessageInternal(content, isRegeneration) {
            const chat = getCurrentChat();
            if (!isRegeneration) {
                if (chat.messages.length === 0) { chat.title = content.substring(0,15)+(content.length>15?'...':''); renderChatList(); }
                chat.messages.push({ role: 'user', content: content });
                updateLastUserTime();
            }
            saveData(); renderMessages(); scrollToBottom();
            const thinkingDiv = document.createElement('div');
            thinkingDiv.className = 'msg assistant-msg'; thinkingDiv.textContent = '思考中...'; thinkingDiv.style.alignSelf = 'flex-start';
            chatBoxEl.appendChild(thinkingDiv); scrollToBottom();
            const sp = buildSystemPrompt(); let apiMsgs = []; if (sp) apiMsgs.push({ role: 'system', content: sp });
            apiMsgs = apiMsgs.concat(chat.messages);
            try {
                const res = await fetch('https://api.deepseek.com/v1/chat/completions', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` }, body: JSON.stringify({ model: 'deepseek-chat', messages: apiMsgs, stream: false }) });
                const data = await res.json(); thinkingDiv.remove();
                if (data.choices && data.choices[0].message) {
                    chat.messages.push({ role: 'assistant', content: data.choices[0].message.content });
                } else { chat.messages.push({ role: 'assistant', content: '出错：'+JSON.stringify(data) }); }
            } catch (err) { thinkingDiv.remove(); chat.messages.push({ role: 'assistant', content: '网络错误：'+err.message }); }
            saveData(); renderMessages(); scrollToBottom();
        }

        // ==================== 角色主动性 ====================
        function editAutoPush() {
            document.getElementById('ap-enabled').checked = autoPushSettings.enabled;
            document.getElementById('ap-interval').value = autoPushSettings.interval;
            document.getElementById('ap-interval-val').textContent = autoPushSettings.interval;
            document.getElementById('ap-pause-start').value = autoPushSettings.pauseStart;
            document.getElementById('ap-pause-end').value = autoPushSettings.pauseEnd;
            document.getElementById('auto-push-overlay').style.display = 'flex';
            closeSidebar();
        }
        function saveAutoPush() {
            autoPushSettings.enabled = document.getElementById('ap-enabled').checked;
            autoPushSettings.interval = parseInt(document.getElementById('ap-interval').value);
            autoPushSettings.pauseStart = parseInt(document.getElementById('ap-pause-start').value);
            autoPushSettings.pauseEnd = parseInt(document.getElementById('ap-pause-end').value);
            localStorage.setItem(AUTO_PUSH_KEY, JSON.stringify(autoPushSettings));
            closeOverlay('auto-push-overlay');
            restartAutoPushTimer();
        }
        function isInPausePeriod() {
            const now = new Date();
            const hour = now.getHours();
            const start = autoPushSettings.pauseStart;
            const end = autoPushSettings.pauseEnd;
            if (start <= end) { return hour >= start && hour < end; }
            else { return hour >= start || hour < end; }
        }
        function checkAutoPush() {
            if (!autoPushSettings.enabled) return;
            if (isAutoPushInProgress) return;
            if (isInPausePeriod()) return;
            const now = Date.now();
            const intervalMs = autoPushSettings.interval * 60 * 1000;
            if (now - lastUserMessageTime < intervalMs) return;
            const lastAutoPush = localStorage.getItem('deepseek_last_auto_push_time');
            if (lastAutoPush && (now - parseInt(lastAutoPush)) < 120000) return;
            performAutoPush();
        }
        async function performAutoPush() {
            if (isAutoPushInProgress) return;
            isAutoPushInProgress = true;
            const chat = getCurrentChat();
            if (!chat || !apiKey) { isAutoPushInProgress = false; return; }
            if (chat.messages.length === 0) { isAutoPushInProgress = false; return; }
            const systemPrompt = buildAutoPushSystemPrompt();
            const apiMessages = [{ role: 'system', content: systemPrompt }];
            const recentMessages = chat.messages.slice(-10);
            apiMessages.push(...recentMessages);
            apiMessages.push({ role: 'user', content: '（用户沉默了一段时间）' });
            try {
                const res = await fetch('https://api.deepseek.com/v1/chat/completions', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` }, body: JSON.stringify({ model: 'deepseek-chat', messages: apiMessages, stream: false }) });
                const data = await res.json();
                if (data.choices && data.choices[0].message) {
                    const content = data.choices[0].message.content;
                    chat.messages.push({ role: 'assistant', content: content, autoPush: true });
                    saveData();
                    refreshUI();
                    localStorage.setItem('deepseek_last_auto_push_time', Date.now());
                }
            } catch (err) { console.error('自动推送失败', err); }
            isAutoPushInProgress = false;
        }
        function buildAutoPushSystemPrompt() {
            let parts = [];
            parts.push('【全局规则 · 最高优先级】你正在进行角色扮演。现在对话已沉默一段时间。');
            parts.push('请以你扮演的角色身份，主动发起一条消息，推动剧情或表达角色的内心动态。');
            parts.push('内容必须符合角色设定、对话背景和之前的对话历史。');
            parts.push('不要询问用户“在吗”，要像角色在自言自语或发现新情况一样自然。');
            if (defaultFeatures.writing) parts.push(`写作要求：${defaultFeatures.writing}`);
            if (defaultFeatures.dialogue) parts.push(`对话要求：${defaultFeatures.dialogue}`);
            if (defaultFeatures.theme) parts.push(`对话主旨：${defaultFeatures.theme}`);
            if (defaultFeatures.bannedWords) parts.push(`禁止词：${defaultFeatures.bannedWords}`);
            if (defaultFeatures.taboos) parts.push(`禁忌：${defaultFeatures.taboos}`);
            if (defaultFeatures.auxiliary) parts.push(`辅助设定：${defaultFeatures.auxiliary}`);
            const chat = getCurrentChat();
            const scene = chat.sceneCard || {};
            if (scene.world || scene.plot || scene.opening) {
                parts.push('\n【对话背景】');
                if (scene.world) parts.push(`世界观：${scene.world}`);
                if (scene.plot) parts.push(`前置剧情：${scene.plot}`);
                if (scene.opening) parts.push(`当前场景：${scene.opening}`);
            }
            const card = chat.characterCard || {};
            if (card.name) {
                parts.push(`\n你扮演${card.name}。${card.gender ? `性别${card.gender}。` : ''}${card.identity ? `身份${card.identity}。` : ''}${card.personality ? `性格：${card.personality}。` : ''}${card.corePersonality ? `核心人格：${card.corePersonality}。` : ''}${card.backstory ? `经历：${card.backstory}。` : ''}${card.attitude ? `对用户态度：${card.attitude}。` : ''}${card.extra ? `补充：${card.extra}。` : ''}`);
            }
            const userCard = chat.userCard || {};
            if (userCard.name) {
                parts.push(`\n正在与你对话的用户是${userCard.name}。${userCard.identity ? `身份：${userCard.identity}。` : ''}${userCard.attitude ? `对你的态度：${userCard.attitude}。` : ''}`);
            }
            return parts.join('\n');
        }
        function restartAutoPushTimer() {
            if (autoPushTimer) clearInterval(autoPushTimer);
            if (autoPushSettings.enabled) { autoPushTimer = setInterval(checkAutoPush, 10000); }
        }
        function updateLastUserTime() { lastUserMessageTime = Date.now(); }

        // ==================== 基础操作 ====================
        function switchChat(id) { currentChatId = id; saveData(); refreshUI(); closeSidebar(); }
        function createNewChat() {
            chats.unshift({ id: generateId(), title: '新对话', messages: [], userCard: {}, characterCard: {}, sceneCard: {} });
            currentChatId = chats[0].id; saveData(); refreshUI(); userInputEl.focus(); closeSidebar();
        }
        function deleteChat(id) { if (chats.length <= 1) { alert('至少保留一个对话'); return; } if (!confirm('删除此对话？')) return; chats = chats.filter(c=>c.id!==id); if (currentChatId===id) currentChatId=chats[0].id; saveData(); refreshUI(); }
        function escapeHtml(text) { return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

        userInputEl.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px'; });
        userInputEl.addEventListener('keydown', function(e) { if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); sendMessage(); } });

        // ==================== 初始化 ====================
        loadData();
        applyTheme();
        applyBackground();
        refreshUI();
        restartAutoPushTimer();
    </script>
